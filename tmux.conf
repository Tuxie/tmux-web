# tmux-web default config

# Set Ctrl+s as alternative prefix
unbind C-s
set-option -g prefix2 C-s

# Enable modern terminal features
set -g allow-passthrough on
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features ',*ghostty*:extkeys'
set -as terminal-overrides ',*:SetClipboard=on'
# `external` (not `on`) so OSC 52 reads/writes are forwarded to the outer
# terminal (tmux-web) instead of being served from tmux's own paste buffer.
# This is what makes apps like vim's `:r !...` / set clipboard=unnamedplus
# actually see the user's browser clipboard via the tmux-web consent flow.
set -s set-clipboard external
set-environment -g COLORTERM truecolor

set -g status off               # tmux-web already has a toolbar
set -s escape-time 10           # faster command sequences
set -sg repeat-time 600         # increase repeat timeout
set -g base-index 1             # start windows numbering at 1
setw -g pane-base-index 1       # make pane numbering consistent with windows
setw -g automatic-rename on     # rename window to reflect current program
set -g renumber-windows on      # renumber windows when a window is closed
set -g set-titles on            # set terminal title
set -g display-panes-time 800   # slightly longer pane indicators display time
set -g display-time 1000        # slightly longer status messages display time
set -g monitor-activity on
set -g visual-activity off
set -g history-limit 50000

# Default to vi bindings
setw -g mode-keys vi

# Switch to the previous session when the current one exits instead of detaching.
set -g detach-on-destroy no-detached

# Enable mouse
set -g mouse on

# Follow the latest-resizing client so the tmux-web control-mode client
# (which never resizes after its attach-time refresh-client -C 10000x10000)
# can't shrink the session to 80x24. See tmux-control.ts and the design
# spec at docs/superpowers/specs/2026-04-22-tmux-control-mode-design.md.
set -g window-size latest

# Don't require releasing Ctrl after prefix for these often used commands
bind C-c new-window       # Create a new window
bind C-n next-window      # Switch to the next window
bind C-p previous-window  # Switch to the previous window
bind C-z resize-pane -Z   # Toggle full-screen pane

# Scroll up and down with Shift+J/K in copy mode
bind -T copy-mode-vi J send -X page-down
bind -T copy-mode-vi K send -X page-up
# Escape exits copy-mode
bind -T copy-mode-vi Escape send -X cancel
# Mouse wheel scrolls 1 line at a time in copy-mode (default is 5); Ctrl+wheel = 10
bind -T copy-mode-vi WheelUpPane     select-pane \; send -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane   select-pane \; send -X -N 1 scroll-down
bind -T copy-mode-vi C-WheelUpPane   select-pane \; send -X -N 10 scroll-up
bind -T copy-mode-vi C-WheelDownPane select-pane \; send -X -N 10 scroll-down
# Use v to start selecting and y to copy in copy-mode, like in Vim
# Shift-v already selects the whole line
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# Press p in copy-mode to copy then paste the current selection
bind -T copy-mode-vi p send -X copy-selection-and-cancel \; run -b 'tmux paste-buffer'
# Press prefix + Shift-p to pick an older copied text to paste
bind P choose-buffer

# Split shortcuts
bind v split-window -h  # Vertical split
bind V split-window -v  # Horizontal split
bind _ resize-pane -Z   # Make current pane full-screen
bind = select-layout -E # Make all panes equal size

# Switch pane with prefix + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize pane with prefix + shift-h/j/k/l (repeatable)
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Select session with prefix + s
bind s choose-tree -Zs
# Add a new session with prefix + Shift-S and give it a name
bind S command-prompt -p "New session name:" "run-shell 'NS=\"%%\"; tmux new -ds \"\$NS\"; tmux switch-client -t \"\$NS\"'"
# Switch back and forth between the last two sessions with prefix + Ctrl-s
bind-key C-s switch-client -l

# Load user config (silent if not found) — user can override any setting above
source-file -q /etc/tmux.conf
source-file -q ~/.tmux.conf
source-file -q ~/.config/tmux/tmux.conf
source-file -q /etc/tmux-web.conf
source-file -q ~/.config/tmux-web/tmux.conf
source-file -q ~/.config/tmux-web/tmux-web.conf
