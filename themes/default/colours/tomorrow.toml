# Tomorrow — https://github.com/chriskempson/tomorrow-theme
[colors.primary]
background = "#ffffff"
foreground = "#4d4d4c"

[colors.cursor]
text   = "#ffffff"
cursor = "#4d4d4c"

[colors.selection]
background = "#d6d6d6"
text       = "#4d4d4c"

[colors.normal]
black   = "#000000"
red     = "#c82829"
green   = "#718c00"
yellow  = "#eab700"
blue    = "#4271ae"
magenta = "#8959a8"
cyan    = "#3e999f"
white   = "#ffffff"

[colors.bright]
black   = "#8e908c"
red     = "#c82829"
green   = "#718c00"
yellow  = "#eab700"
blue    = "#4271ae"
magenta = "#8959a8"
cyan    = "#3e999f"
white   = "#ffffff"
