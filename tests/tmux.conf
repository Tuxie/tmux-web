# Shared tmux.conf for all e2e tests.
# Must be the single config used by every createIsolatedTmux caller.
set -g allow-passthrough on
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features ',*:extkeys:RGB'

# OSC 52 forwarded to outer terminal (tmux-web) — not stored in paste buffer.
set -as terminal-overrides ',*:SetClipboard=on'
set -s set-clipboard external

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g remain-on-exit on
setw -g mode-keys vi

set -g detach-on-destroy no-detached

# Smooth scrolling in copy-mode
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# Copy-mode vim bindings (used by e2e copy-mode test)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
