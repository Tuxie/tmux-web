set -g allow-passthrough on
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'        # xterm, most defaults
set -as terminal-features ',*ghostty*:extkeys'    # Ghostty

# Enable support for remote copy to the local clipboard with ocs52 protocol
set -as terminal-overrides ',*:SetClipboard=on'
set -s set-clipboard on

set -g base-index 1             # start windows numbering at 1
setw -g pane-base-index 1       # make pane numbering consistent with windows
setw -g automatic-rename on     # rename window to reflect current program
set -g renumber-windows on      # renumber windows when a window is closed
set -g set-titles on            # set terminal title

setw -g mode-keys vi

# Switch to the previous session when the current one exits instead of detaching.
set -g detach-on-destroy no-detached

# Make scrolling smooth (1 line at a time)
# copy-mode-vi: applies once already in copy mode
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down
# root table: enter copy mode and scroll 1 line on the first wheel event
#bind -T root WheelUpPane   select-pane -t= \; if-shell -F "#{alternate_on}" "send-keys -M" "copy-mode -e \; send-keys -X -N 1 scroll-up"
#bind -T root WheelDownPane select-pane -t= \; if-shell -F "#{alternate_on}" "send-keys -M" "send-keys -X -N 1 scroll-down"

# Load user config (silent if not found) — user can override any setting above
#source-file -q ~/.config/tmux/tmux.conf
#source-file -q ~/.tmux.conf
