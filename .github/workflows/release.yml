name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Single linux-only E2E gate that runs before the 4-leg build matrix.
  # A failing E2E blocks every build leg. Running Playwright per-leg would
  # quadruple cost for no real coverage gain — browser-level regressions
  # are platform-agnostic. If a regression only manifests on macOS, we'll
  # catch it in local `make test` before tagging.
  e2e:
    name: E2E (ubuntu)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      # tmux + inotify-tools are pre-installed on GitHub's ubuntu-latest
      # runner image, but minimal `act` containers ship without them.
      # origin-check.test.ts runs the server without `--test` mode so
      # `tmux -V` must succeed at startup; the file-drop auto-unlink
      # path uses `inotifywait` and its tests don't run when the binary
      # is absent, which drops `src/server/file-drop.ts` below the 95%
      # coverage gate.
      - name: Install tmux and inotify-tools (linux CI helpers)
        run: sudo apt-get update && sudo apt-get install -y tmux inotify-tools

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend and generate assets
        run: |
          bun run bun-build.ts
          bun run scripts/generate-assets.ts

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bunx playwright test

  build:
    name: Build for ${{ matrix.name }}
    needs: e2e
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            name: linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            name: linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            name: darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            name: darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      # Linux runner only: tmux + inotify-tools are pre-installed on
      # GitHub's ubuntu-latest image but absent from minimal `act`
      # containers. Coverage gate on `src/server/file-drop.ts` depends
      # on inotifywait being probeable. macOS runners skip the
      # auto-unlink tests via the same probe, which is fine.
      - name: Install tmux and inotify-tools (linux CI helpers)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux inotify-tools

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend and generate assets
        run: |
          bun run bun-build.ts
          bun run scripts/generate-assets.ts

      - name: Typecheck
        run: |
          bun x tsc --noEmit -p tsconfig.json
          bun x tsc --noEmit -p tsconfig.client.json

      - name: Compile binary
        run: |
          BUN_NO_CODESIGN_MACHO_BINARY=1 bun build src/server/index.ts --compile --minify --sourcemap --bytecode --target=${{ matrix.target }} --outfile tmux-web

      - name: Ad-hoc sign macOS binary
        if: runner.os == 'macOS'
        run: codesign --sign - --force tmux-web

      # Coverage gate runs on linux only: the macOS legs skip 9
      # linux-specific tests (inotify-driven auto-unlink in
      # file-drop.ts, /proc/<pid>/exe → BLAKE3 pinning in
      # foreground-process.ts + ws.ts OSC 52 flows) which drops those
      # three files below their per-file thresholds on macOS. Tests
      # still run on macOS; they just don't gate coverage.
      - name: Run unit tests with coverage gate (linux)
        if: runner.os == 'Linux'
        run: bun run coverage:check
      - name: Run unit tests (macOS)
        if: runner.os == 'macOS'
        run: bun test

      # Post-compile verification: block release if the compiled binary
      # serves the npm @xterm/xterm bundle instead of vendor/xterm.js.
      # This has regressed several times; see CLAUDE.md.
      #
      # Only runs on legs where the runner arch matches the compiled target
      # (x64 runner for bun-linux-x64, arm64 runner for bun-darwin-arm64).
      # The cross-compiled legs produce a binary the runner can't execute;
      # the sentinel embed check is identical across archs anyway, so one
      # pass per OS is sufficient.
      - name: Verify compiled binary embeds vendor/xterm.js
        if: matrix.target == 'bun-linux-x64' || matrix.target == 'bun-darwin-arm64'
        run: bun scripts/verify-vendor-xterm.ts ./tmux-web

      - name: Package release
        run: |
          # Flat archive layout so Homebrew / other packagers can
          # `bin.install "tmux-web"` without a cd-into-subdir dance.
          mkdir -p release
          cp README.md LICENSE tmux-web.service tmux-web release/
          cd release
          tar -cJf ../tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz \
            tmux-web README.md LICENSE tmux-web.service
          cd ..
          mv tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz release/
          # SHA-256 alongside the archive — consumed by the Homebrew
          # formula and by users verifying the download.
          cd release
          shasum -a 256 tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz \
            > tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tmux-web-${{ github.ref_name }}-${{ matrix.name }}-artifact
          path: |
            release/tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz
            release/tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz.sha256
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: tmux-web-*-artifact
          path: artifacts
          merge-multiple: true

      - name: Extract release notes for this tag
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull everything between "## <VERSION>" and the next "## "
          # heading out of CHANGELOG.md. If no section exists we still
          # want a release body, so fall back to a short placeholder.
          awk -v ver="## $VERSION" '
            $0 ~ "^" ver "( |$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for $VERSION — using a placeholder." >&2
            printf 'Release %s. See the commit log for details.\n' "$VERSION" > release-notes.md
          fi
          echo "---- release-notes.md ----"
          cat release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: release-notes.md
          files: |
            artifacts/*.tar.xz
            artifacts/*.tar.xz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # The Homebrew tap bump lives entirely in `.github/workflows/bump-
  # homebrew-tap.yml`, triggered by `release: published` (plus a
  # workflow_dispatch fallback). The inline `homebrew:` job that used
  # to live here raced the standalone workflow on every tag push —
  # cluster 13 removed it.
