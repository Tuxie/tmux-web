name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            name: linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            name: linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            name: darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            name: darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend and generate assets
        run: |
          bun run bun-build.ts
          bun run scripts/generate-assets.ts

      - name: Typecheck
        run: |
          bun x tsc --noEmit -p tsconfig.json
          bun x tsc --noEmit -p tsconfig.client.json

      - name: Compile binary
        run: |
          BUN_NO_CODESIGN_MACHO_BINARY=1 bun build src/server/index.ts --compile --minify --sourcemap --bytecode --target=${{ matrix.target }} --outfile tmux-web

      - name: Ad-hoc sign macOS binary
        if: runner.os == 'macOS'
        run: codesign --sign - --force tmux-web

      - name: Run unit tests with coverage gate
        run: bun run coverage:check

      # Only runs on legs where the runner arch matches the compiled target
      # (x64 runner for bun-linux-x64, arm64 runner for bun-darwin-arm64).
      # The cross-compiled legs produce a binary the runner can't execute;
      # the sentinel embed check is identical across archs anyway, so one
      # pass per OS is sufficient.
      - name: Verify compiled binary embeds vendor/xterm.js
        if: matrix.target == 'bun-linux-x64' || matrix.target == 'bun-darwin-arm64'
        run: bun scripts/verify-vendor-xterm.ts ./tmux-web

      - name: Package release
        run: |
          # Flat archive layout so Homebrew / other packagers can
          # `bin.install "tmux-web"` without a cd-into-subdir dance.
          mkdir -p release
          cp README.md LICENSE tmux-web.service tmux-web release/
          cd release
          tar -cJf ../tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz \
            tmux-web README.md LICENSE tmux-web.service
          cd ..
          mv tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz release/
          # SHA-256 alongside the archive — consumed by the Homebrew
          # formula and by users verifying the download.
          cd release
          shasum -a 256 tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz \
            > tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tmux-web-${{ github.ref_name }}-${{ matrix.name }}-artifact
          path: |
            release/tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz
            release/tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz.sha256
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: tmux-web-*-artifact
          path: artifacts
          merge-multiple: true

      - name: Extract release notes for this tag
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull everything between "## <VERSION>" and the next "## "
          # heading out of CHANGELOG.md. If no section exists we still
          # want a release body, so fall back to a short placeholder.
          awk -v ver="## $VERSION" '
            $0 ~ "^" ver "( |$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for $VERSION — using a placeholder." >&2
            printf 'Release %s. See the commit log for details.\n' "$VERSION" > release-notes.md
          fi
          echo "---- release-notes.md ----"
          cat release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: release-notes.md
          files: |
            artifacts/*.tar.xz
            artifacts/*.tar.xz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Bump Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fetch SHA-256 sidecars
        id: shas
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          base="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          for arch in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            url="${base}/tmux-web-${TAG}-${arch}.tar.xz.sha256"
            sha=$(curl -fsSL "$url" | awk '{print $1}')
            if [ -z "$sha" ]; then
              echo "Failed to read sha for $arch from $url" >&2
              exit 1
            fi
            key=$(echo "$arch" | tr '-' '_')
            echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
            echo "$arch = $sha"
          done

      - name: Check out homebrew-tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: Tuxie/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Rewrite Formula/tmux-web.rb
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          DARWIN_ARM64: ${{ steps.shas.outputs.darwin_arm64 }}
          DARWIN_X64:   ${{ steps.shas.outputs.darwin_x64 }}
          LINUX_ARM64:  ${{ steps.shas.outputs.linux_arm64 }}
          LINUX_X64:    ${{ steps.shas.outputs.linux_x64 }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          FILE=Formula/tmux-web.rb

          python3 - <<'PY'
          import os, re, pathlib

          version      = os.environ["VERSION"]
          shas         = [
            os.environ["DARWIN_ARM64"],
            os.environ["DARWIN_X64"],
            os.environ["LINUX_ARM64"],
            os.environ["LINUX_X64"],
          ]

          p = pathlib.Path("Formula/tmux-web.rb")
          txt = p.read_text()

          txt = re.sub(r'version\s+"[^"]+"', f'version "{version}"', txt, count=1)

          state = {"i": 0}
          def repl(m):
              i = state["i"]
              if i >= 4:
                  return m.group(0)
              state["i"] = i + 1
              return f'sha256 "{shas[i]}"'
          txt = re.sub(r'sha256\s+"[^"]+"', repl, txt)

          if state["i"] != 4:
              raise SystemExit(f'expected 4 sha256 lines, rewrote {state["i"]}')

          p.write_text(txt)
          PY

          git --no-pager diff "$FILE"

      - name: Commit and push to homebrew-tap
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit — formula is already at v$VERSION."
            exit 0
          fi
          git add Formula/tmux-web.rb
          git commit -m "tmux-web $VERSION"
          git push origin HEAD:main
