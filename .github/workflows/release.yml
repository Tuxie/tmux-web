name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Single linux-only E2E gate that runs before the 4-leg build matrix.
  # A failing E2E blocks every build leg. Running Playwright per-leg would
  # quadruple cost for no real coverage gain — browser-level regressions
  # are platform-agnostic. If a regression only manifests on macOS, we'll
  # catch it in local `make test` before tagging.
  e2e:
    name: E2E (ubuntu)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      # tmux + inotify-tools are pre-installed on GitHub's ubuntu-latest
      # runner image, but minimal `act` containers ship without them.
      # origin-check.test.ts runs the server without `--test` mode so
      # `tmux -V` must succeed at startup; the file-drop auto-unlink
      # path uses `inotifywait` and its tests don't run when the binary
      # is absent, which drops `src/server/file-drop.ts` below the 95%
      # coverage gate.
      - name: Install tmux and inotify-tools (linux CI helpers)
        run: sudo apt-get update && sudo apt-get install -y tmux inotify-tools

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend and generate assets
        run: |
          bun run bun-build.ts
          bun run scripts/generate-assets.ts

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bunx playwright test

  build:
    name: Build for ${{ matrix.name }}
    needs: e2e
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest        # x64 host
            target: bun-linux-x64
            name: linux-x64
            desktop_platform: linux
            desktop_arch: x64
          - os: ubuntu-24.04-arm     # arm64 host (free for public repos)
            target: bun-linux-arm64
            name: linux-arm64
            desktop_platform: linux
            desktop_arch: arm64
          - os: macos-26-intel       # Intel x64 host (macos-13 was retired)
            target: bun-darwin-x64
            name: darwin-x64
            desktop_platform: macos
            desktop_arch: x64
          - os: macos-latest         # arm64 host (Apple Silicon)
            target: bun-darwin-arm64
            name: darwin-arm64
            desktop_platform: macos
            desktop_arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      # Linux runners: tmux + inotify-tools are pre-installed on GitHub's
      # ubuntu images but absent from minimal `act` containers. Coverage
      # gate on `src/server/file-drop.ts` depends on inotifywait being
      # probeable.
      - name: Install build deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux inotify-tools

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend and generate assets
        run: |
          bun run bun-build.ts
          bun run scripts/generate-assets.ts

      - name: Typecheck
        run: |
          bun x tsc --noEmit -p tsconfig.json
          bun x tsc --noEmit -p tsconfig.client.json

      - name: Compile binary
        run: |
          BUN_NO_CODESIGN_MACHO_BINARY=1 bun build src/server/index.ts --compile --minify --sourcemap --bytecode --target=${{ matrix.target }} --outfile tmux-web

      - name: Ad-hoc sign macOS binary
        if: runner.os == 'macOS'
        run: codesign --sign - --force tmux-web

      # Coverage gate runs on linux only: the macOS legs skip 9
      # linux-specific tests (inotify-driven auto-unlink in
      # file-drop.ts, /proc/<pid>/exe → BLAKE3 pinning in
      # foreground-process.ts + ws.ts OSC 52 flows) which drops those
      # three files below their per-file thresholds on macOS. Tests
      # still run on macOS; they just don't gate coverage.
      #
      # Known coverage gap, documented intentionally: a macOS-only
      # regression in OSC 52 / file-drop / foreground-process modules
      # would ship — coverage gating is Linux-only by design. The
      # tradeoff is acceptable for a T2 solo-maintainer project; the
      # alternative (per-OS coverage gates with platform-specific
      # thresholds) is T3-tier infrastructure. Re-evaluate if that
      # tier is adopted.
      - name: Run unit tests with coverage gate (linux)
        if: runner.os == 'Linux'
        run: bun run coverage:check
      - name: Run unit tests (macOS)
        if: runner.os == 'macOS'
        run: bun test

      # Post-compile verification: block release if the compiled binary
      # is missing the vendor/xterm.js bundle.
      - name: Verify compiled binary embeds vendor/xterm.js
        run: bun scripts/verify-vendor-xterm.ts ./tmux-web

      - name: Package release
        run: |
          # Flat archive layout so Homebrew / other packagers can
          # `bin.install "tmux-web"` without a cd-into-subdir dance.
          # systemd is Linux-only — omit tmux-web.service from the
          # macOS tarballs (Homebrew users would have no use for it).
          mkdir -p release
          cp README.md LICENSE tmux-web release/
          FILES="tmux-web README.md LICENSE"
          if [ "${{ runner.os }}" = "Linux" ]; then
            cp tmux-web.service release/
            FILES="$FILES tmux-web.service"
          fi
          cd release
          tar -cJf ../tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz $FILES
          cd ..
          mv tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz release/
          # SHA-256 alongside the archive — consumed by the Homebrew
          # formula and by users verifying the download.
          cd release
          shasum -a 256 tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz \
            > tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz.sha256

      # Post-package smoke test (Linux only): extract the tarball into a
      # temp dir and run the extracted binary's `--version` and `--help`
      # to prove the archive actually contains a runnable binary at the
      # expected path with executable permissions. The v1.8.0 bunfs
      # precedent (CHANGELOG.md `1.8.1` entry) is the canonical example
      # of why this exists: four binaries shipped with broken tmux
      # extraction because nothing in CI ran the *packaged* artifact.
      # macOS tarballs are exercised via verify-vendor-xterm against the
      # pre-package binary (same bytes); this smoke is the missing
      # complement on Linux where extraction permissions/layout could
      # also regress.
      - name: Smoke-test packaged tarball (linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          tarball="release/tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz"
          smoke_dir="$(mktemp -d)"
          tar -xJf "$tarball" -C "$smoke_dir"
          binary="$smoke_dir/tmux-web"
          if [ ! -f "$binary" ]; then
            echo "smoke: tarball did not contain tmux-web at $binary" >&2
            exit 1
          fi
          chmod 0755 "$binary"
          "$binary" --version
          "$binary" --help | grep -q -- '--listen'

      - name: Run post-compile binary smoke tests (linux)
        if: runner.os == 'Linux'
        env:
          TMUX_WEB_BINARY: ${{ github.workspace }}/tmux-web
        run: |
          set -euo pipefail
          # Re-extract the packaged tarball into a temp dir so the
          # post-compile suite runs against the *packaged* binary, not
          # the pre-package build. Catches any regression that touches
          # only the archive layout / permissions.
          tarball="release/tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz"
          smoke_dir="$(mktemp -d)"
          tar -xJf "$tarball" -C "$smoke_dir"
          chmod 0755 "$smoke_dir/tmux-web"
          TMUX_WEB_BINARY="$smoke_dir/tmux-web" bun test tests/post-compile/

      - name: Build tmux-term desktop app
        # Temporarily skip macOS tmux-term artifacts until we can sign them
        # with an Apple Developer certificate.
        if: matrix.desktop_platform != 'macos'
        run: bun run desktop:stable

      - name: Verify tmux-term desktop app
        if: matrix.desktop_platform != 'macos'
        run: bun scripts/verify-electrobun-bundle.ts build stable

      - name: Package tmux-term desktop app
        if: matrix.desktop_platform != 'macos'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          PREFIX="stable-${{ matrix.desktop_platform }}-${{ matrix.desktop_arch }}-"
          found=0
          for src in artifacts/${PREFIX}*; do
            [ -e "$src" ] || continue
            found=1
            base="$(basename "$src")"
            suffix="${base#$PREFIX}"
            if [ "$suffix" = "update.json" ]; then
              dest="release/tmux-term-${{ github.ref_name }}-${{ matrix.name }}-update.json"
            else
              dest="release/tmux-term-${{ github.ref_name }}-${{ matrix.name }}${suffix#tmux-term}"
            fi
            cp "$src" "$dest"
            shasum -a 256 "$dest" > "$dest.sha256"
          done
          if [ "$found" -ne 1 ]; then
            echo "No tmux-term Electrobun artifacts found for ${PREFIX}" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tmux-web-${{ github.ref_name }}-${{ matrix.name }}-artifact
          path: |
            release/tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz
            release/tmux-web-${{ github.ref_name }}-${{ matrix.name }}.tar.xz.sha256
          retention-days: 1

      - name: Upload tmux-term artifact
        if: matrix.desktop_platform != 'macos'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tmux-term-${{ github.ref_name }}-${{ matrix.name }}-artifact
          path: |
            release/tmux-term-${{ github.ref_name }}-${{ matrix.name }}*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: '*-${{ github.ref_name }}-*-artifact'
          path: artifacts
          merge-multiple: true

      - name: Extract release notes for this tag
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull everything between "## <VERSION>" and the next "## "
          # heading out of CHANGELOG.md. If no section exists we still
          # want a release body, so fall back to a short placeholder.
          awk -v ver="## $VERSION" '
            $0 ~ "^" ver "( |$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for $VERSION — using a placeholder." >&2
            printf 'Release %s. See the commit log for details.\n' "$VERSION" > release-notes.md
          fi
          echo "---- release-notes.md ----"
          cat release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: release-notes.md
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Homebrew tap bump: delegated to the reusable workflow in
  # .github/workflows/bump-homebrew-tap.yml via workflow_call. Chained
  # workflow_call invocations run even when the parent was triggered by
  # GITHUB_TOKEN (unlike `release: published` events, which GitHub
  # suppresses to prevent infinite loops). `needs: release` means it
  # only runs after the GitHub release + its assets are live.
  bump-homebrew:
    name: Bump Homebrew tap
    needs: release
    uses: ./.github/workflows/bump-homebrew-tap.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
