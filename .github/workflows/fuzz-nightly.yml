name: Fuzz (nightly)

# Property/fuzz tests cover nine security-sensitive parsers (shell
# quoting, filename / session sanitisation, OSC 52 extraction, origin
# parsing, WS router, TOML colour parsing, /proc/<pid>/stat parsing,
# TT message extraction). They live under tests/fuzz/ and are
# excluded from `bun test` / the release CI path (bunfig.toml pins the
# default test root to tests/unit) so per-release time stays low.
#
# This workflow runs them on a schedule against `main` so a regression
# in those parsers gets caught even if a release is tagged without the
# documented `make fuzz` pre-tag step. Decoupled from release.yml on
# purpose — keeping the release path fast is more valuable than
# blocking a tag on a fuzz iteration. See AGENTS.md and cluster-06
# (docs/code-analysis/2026-04-26) for the trade-off.

on:
  schedule:
    # Daily at 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    name: Fuzz (ubuntu)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      # Mirrors release.yml: tmux + inotify-tools are pre-installed on
      # GitHub's ubuntu-latest image but absent from minimal `act`
      # containers. The fuzz suites that touch tmux-injected paths or
      # file-drop need both binaries to be probeable.
      - name: Install tmux and inotify-tools (linux CI helpers)
        run: sudo apt-get update && sudo apt-get install -y tmux inotify-tools

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run fuzz tests
        run: make fuzz
