<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TuxieTerm</title>
  <script>
    // Consume menu-reopen flag synchronously during HTML parse, before any deferred
    // module script. This avoids a race where Playwright-style fast interactions
    // (click + reload) fire on a freshly-loaded page before topbar.setupMenu() runs.
    // If the flag lingered in sessionStorage, a subsequent unrelated reload would
    // unexpectedly reopen the menu.
    try {
      if (sessionStorage.getItem('tmux-web:menu-reopen')) {
        sessionStorage.removeItem('tmux-web:menu-reopen');
        window.__menuReopen = true;
      }
    } catch (e) {}
  </script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%231e1e1e'/%3E%3Crect x='0' y='0' width='32' height='7' rx='4' fill='%23333'/%3E%3Crect x='0' y='4' width='32' height='3' fill='%23333'/%3E%3Ccircle cx='5' cy='3.5' r='1.5' fill='%23ff5f57'/%3E%3Ccircle cx='10' cy='3.5' r='1.5' fill='%23febc2e'/%3E%3Ccircle cx='15' cy='3.5' r='1.5' fill='%2328c840'/%3E%3Ctext x='4' y='23' font-family='monospace' font-size='11' fill='%2300ff88'%3E%26gt%3B_%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/dist/client/xterm.css">
  <link rel="stylesheet" href="/dist/client/base.css">
</head>
<body>
<div id="page">
  <div id="frame-bg"></div>
  <div id="frame-top"></div>
  <div id="frame-right"></div>
  <div id="frame-bottom"></div>
  <div id="frame-left"></div>
  <div id="frame-tl"></div>
  <div id="frame-tr"></div>
  <div id="frame-bl"></div>
  <div id="frame-br"></div>

  <div id="topbar">
    <div id="tb-left"></div>
    <div id="tb-session">
      <select id="session-select" title="Switch tmux session"></select>
      <button class="tb-btn" id="btn-new-session" title="New session">+</button>
    </div>
    <div id="tb-title"></div>
    <div id="tb-windows"><div id="win-tabs"></div></div>
    <div id="tb-spacer"></div>
    <div id="tb-right">
      <div id="menu-wrap" style="position:relative">
        <button class="tb-btn" id="btn-menu" title="Settings">☰</button>
        <div id="menu-dropdown" hidden>
          <label class="menu-row"><input type="checkbox" id="chk-autohide" checked> Autohide toolbar</label>
          <label class="menu-row"><input type="checkbox" id="chk-fullscreen"> Fullscreen</label>
          <hr class="menu-hr">
          <div class="menu-row menu-row-static">
            <span class="menu-label">Theme</span>
            <select id="inp-theme" class="menu-input-select" style="flex:1"></select>
          </div>
          <div class="menu-row menu-row-static">
            <span class="menu-label">Colours</span>
            <select id="inp-colours" class="menu-input-select" style="flex:1"></select>
            <button class="tb-btn" id="btn-reset-colours" title="Reset colours to theme default">↺</button>
          </div>
          <div class="menu-row menu-row-static">
            <span class="menu-label">Opacity</span>
            <input type="range" id="sld-opacity" min="0" max="100" step="1" style="flex:1">
            <input type="number" id="inp-opacity" min="0" max="100" step="1" class="menu-input-number">
          </div>
          <hr class="menu-hr">
          <div class="menu-row menu-row-static">
            <span class="menu-label">Font</span>
            <select id="inp-font-bundled" class="menu-input-select" style="flex:1"></select>
            <button class="tb-btn" id="btn-reset-font" title="Reset font to theme default">↺</button>
          </div>
          <div class="menu-row menu-row-static">
            <span class="menu-label">Size</span>
            <input type="range" id="sld-fontsize" min="8" max="30" step="0.5" style="flex:1">
            <input type="number" id="inp-fontsize" min="8" max="30" step="0.5" class="menu-input-number">
          </div>
          <div class="menu-row menu-row-static">
            <span class="menu-label">Spacing</span>
            <input type="range" id="sld-spacing" min="0.5" max="2" step="0.05" style="flex:1">
            <input type="number" id="inp-spacing" min="0.5" max="2" step="0.05" class="menu-input-number">
          </div>
          <hr class="menu-hr">
          <div id="menu-footer" class="menu-row menu-row-static" style="justify-content:space-between;color:#888;font-size:11px"><span id="menu-footer-left"></span><span id="menu-footer-right"></span></div>
        </div>
      </div>
    </div>
  </div>
  <div id="terminal"></div>
</div>
  <!-- __CONFIG__ -->
  <script type="module" src="__BUNDLE__"></script>
</body>
</html>
