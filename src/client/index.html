<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TuxieTerm</title>
  <script>
    // Consume menu-reopen flag synchronously during HTML parse, before any deferred
    // module script. This avoids a race where Playwright-style fast interactions
    // (click + reload) fire on a freshly-loaded page before topbar.setupMenu() runs.
    // If the flag lingered in sessionStorage, a subsequent unrelated reload would
    // unexpectedly reopen the menu.
    try {
      if (sessionStorage.getItem('tmux-web:menu-reopen')) {
        sessionStorage.removeItem('tmux-web:menu-reopen');
        window.__menuReopen = true;
      }
    } catch (e) {}
  </script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%20shape-rendering%3D%22crispEdges%22%3E%0A%20%20%3Crect%20width%3D%2232%22%20height%3D%2232%22%20fill%3D%22%237896c5%22%2F%3E%0A%20%20%3Crect%20x%3D%222%22%20y%3D%226%22%20width%3D%2228%22%20height%3D%2224%22%20fill%3D%22%23b8b8b8%22%2F%3E%0A%20%20%3Crect%20x%3D%226%22%20y%3D%2214%22%20width%3D%222%22%20height%3D%222%22%20fill%3D%22%23000%22%2F%3E%0A%20%20%3Crect%20x%3D%2210%22%20y%3D%2214%22%20width%3D%222%22%20height%3D%222%22%20fill%3D%22%23000%22%2F%3E%0A%20%20%3Crect%20x%3D%2214%22%20y%3D%2214%22%20width%3D%222%22%20height%3D%222%22%20fill%3D%22%23000%22%2F%3E%0A%20%20%3Crect%20x%3D%2218%22%20y%3D%2214%22%20width%3D%222%22%20height%3D%222%22%20fill%3D%22%23000%22%2F%3E%0A%20%20%3Crect%20x%3D%226%22%20y%3D%2220%22%20width%3D%222%22%20height%3D%222%22%20fill%3D%22%23000%22%2F%3E%0A%20%20%3Crect%20x%3D%2210%22%20y%3D%2220%22%20width%3D%222%22%20height%3D%222%22%20fill%3D%22%23000%22%2F%3E%0A%3C%2Fsvg%3E" />
  <link rel="stylesheet" href="__XTERM_CSS__">
  <link rel="stylesheet" href="__BASE_CSS__">
  <link id="theme-css" rel="stylesheet" href="__DEFAULT_THEME_CSS__">
</head>
<body>
<div id="page">
  <div id="frame-bg"></div>
  <div id="frame-top"></div>
  <div id="frame-right"></div>
  <div id="frame-bottom"></div>
  <div id="frame-left"></div>
  <div id="frame-tl"></div>
  <div id="frame-tr"></div>
  <div id="frame-bl"></div>
  <div id="frame-br"></div>

  <div id="topbar">
    <div id="tb-left"></div>
    <div id="tb-session">
      <button class="tb-btn tb-btn-session-plus" id="btn-session-plus">
        <span class="tb-session-plus" aria-hidden="true"></span>
      </button>
      <button class="tb-btn tb-btn-session" id="btn-session-menu" title="Switch or create session">
        <span class="tb-session-name" id="tb-session-name"></span>
      </button>
    </div>
    <div id="tb-title" class="electrobun-webkit-app-region-drag"></div>
    <div id="tb-windows"><div id="win-tabs"></div></div>
    <div id="tb-right">
      <div id="menu-wrap">
        <button class="tb-btn" id="btn-menu" title="Settings">☰</button>
        <div id="menu-dropdown" class="tw-dropdown-menu" hidden>
          <div class="tw-menu-row tw-menu-row-static tw-menu-row-drops">
            <div class="tw-drops-header">
              <span class="tw-menu-label">Dropped files</span>
              <span id="drops-count">0</span>
              <button class="tb-btn" id="btn-drops-refresh" title="Refresh list">↻</button>
              <button class="tb-btn" id="btn-drops-purge" title="Delete all drops for this session">Purge</button>
            </div>
            <div id="drops-list"></div>
          </div>
          <hr class="tw-menu-hr">
          <div class="tw-menu-row tw-menu-row-static tw-menu-row-inline">
            <label><input type="checkbox" id="chk-autohide"> Autohide toolbar</label>
            <label><input type="checkbox" id="chk-scrollbar-autohide"> Autohide scrollbar</label>
          </div>
          <label class="tw-menu-row"><input type="checkbox" id="chk-fullscreen"> Fullscreen</label>
          <button class="tw-menu-row tw-config-open-row" id="btn-config-window" type="button">Configuration...</button>

          <div class="tw-menu-section">GUI</div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-theme">Theme</label>
            <select id="inp-theme" class="tw-menu-input-select"></select>
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-theme-hue">Hue</label>
            <input type="range" id="sld-theme-hue" min="0" max="360" step="1" aria-label="Hue">
            <input type="number" id="inp-theme-hue" min="0" max="360" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-theme-sat">Saturation</label>
            <input type="range" id="sld-theme-sat" min="0" max="100" step="1" aria-label="Saturation">
            <input type="number" id="inp-theme-sat" min="0" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-theme-ltn">Brightness</label>
            <input type="range" id="sld-theme-ltn" min="0" max="100" step="1" aria-label="Brightness">
            <input type="number" id="inp-theme-ltn" min="0" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-theme-contrast">Contrast</label>
            <input type="range" id="sld-theme-contrast" min="-100" max="100" step="1" aria-label="Contrast">
            <input type="number" id="inp-theme-contrast" min="-100" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-depth">Bevel</label>
            <input type="range" id="sld-depth" min="0" max="100" step="1" aria-label="Bevel">
            <input type="number" id="inp-depth" min="0" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-section">Background</div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-opacity">Opacity</label>
            <input type="range" id="sld-opacity" min="0" max="100" step="1" aria-label="Background opacity">
            <input type="number" id="inp-opacity" min="0" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-background-hue">Hue</label>
            <input type="range" id="sld-background-hue" min="0" max="360" step="1" aria-label="Background hue">
            <input type="number" id="inp-background-hue" min="0" max="360" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-background-saturation">Saturation</label>
            <input type="range" id="sld-background-saturation" min="-100" max="100" step="1" aria-label="Background saturation">
            <input type="number" id="inp-background-saturation" min="-100" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-background-brightest">Top</label>
            <input type="range" id="sld-background-brightest" min="0" max="100" step="1" aria-label="Background top">
            <input type="number" id="inp-background-brightest" min="0" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-background-darkest">Bottom</label>
            <input type="range" id="sld-background-darkest" min="0" max="100" step="1" aria-label="Background bottom">
            <input type="number" id="inp-background-darkest" min="0" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-section">Terminal</div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-colours">Scheme</label>
            <select id="inp-colours" class="tw-menu-input-select"></select>
            <button class="tb-btn" id="btn-reset-colours" title="Reset colours to theme default">↺</button>
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-tui-bg-opacity">BG Opacity</label>
            <input type="range" id="sld-tui-bg-opacity" min="0" max="100" step="1" aria-label="BG opacity">
            <input type="number" id="inp-tui-bg-opacity" min="0" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-tui-fg-opacity">FG Opacity</label>
            <input type="range" id="sld-tui-fg-opacity" min="0" max="100" step="1" aria-label="FG opacity">
            <input type="number" id="inp-tui-fg-opacity" min="0" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-fg-contrast-strength">Contrast</label>
            <input type="range" id="sld-fg-contrast-strength" min="-100" max="100" step="1" aria-label="FG contrast">
            <input type="number" id="inp-fg-contrast-strength" min="-100" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-fg-contrast-bias">Bias</label>
            <input type="range" id="sld-fg-contrast-bias" min="-100" max="100" step="1" aria-label="FG contrast bias">
            <input type="number" id="inp-fg-contrast-bias" min="-100" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-tui-saturation">Saturation</label>
            <input type="range" id="sld-tui-saturation" min="-100" max="100" step="1" aria-label="Terminal saturation">
            <input type="number" id="inp-tui-saturation" min="-100" max="100" step="1" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-section">Text</div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-font-bundled">Font</label>
            <select id="inp-font-bundled" class="tw-menu-input-select"></select>
            <button class="tb-btn" id="btn-reset-font" title="Reset font to theme default">↺</button>
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-fontsize">Size</label>
            <input type="range" id="sld-fontsize" min="8" max="30" step="0.5" aria-label="Font size">
            <input type="number" id="inp-fontsize" min="8" max="30" step="0.5" class="tw-menu-input-number">
          </div>
          <div class="tw-menu-row tw-menu-row-static">
            <label class="tw-menu-label" for="inp-spacing">Line Spacing</label>
            <input type="range" id="sld-spacing" min="0.5" max="2" step="0.05" aria-label="Line spacing">
            <input type="number" id="inp-spacing" min="0.5" max="2" step="0.05" class="tw-menu-input-number">
          </div>
          <hr class="tw-menu-hr">
          <div id="menu-footer" class="tw-menu-row tw-menu-row-static"><span id="menu-footer-left"></span><span id="menu-footer-right"></span></div>
        </div>
      </div>
    </div>
  </div>
  <div id="tmux-scrollbar" class="tw-scrollbar tw-scrollbar-pinned" aria-hidden="true">
    <div class="tw-scrollbar-track">
      <div class="tw-scrollbar-thumb"></div>
    </div>
  </div>
  <div id="terminal"></div>
</div>
  <!-- __CONFIG__ -->
  <script type="module" src="__BUNDLE__"></script>
</body>
</html>
